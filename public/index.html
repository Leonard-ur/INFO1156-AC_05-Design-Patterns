<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Design Patterns - Posts Feed</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
    </head>
    <body class="min-h-screen bg-zinc-100 text-zinc-900">
        <main class="mx-auto w-full max-w-7xl px-4 py-8">
            <header class="mb-6 text-center">
                <h1 class="text-3xl font-bold tracking-wide">AC_05 - Posts Feed</h1>
                <p class="mt-2 text-sm text-zinc-600">
                    Design Patterns
                </p>
                <div class="mt-4 flex items-center justify-center gap-2">
                    <button
                        class="rounded border border-zinc-900 bg-zinc-900 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-800"
                        type="button"
                        data-open-modal
                    >
                        Add Post
                    </button>
                    <button
                        class="rounded border border-zinc-900 bg-zinc-900 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-800"
                        type="button"
                        id="refresh-feed"
                    >
                        Refresh
                    </button>
                    <select
                        id="feed-mode"
                        class="rounded border border-zinc-400 bg-white px-3 py-2 text-sm"
                    >
                        <option value="latest">Latest</option>
                        <option value="mostLiked">Most Liked</option>
                        <option value="mostCommented">Most Commented</option>
                        <option value="relevance">Relevance</option>
                    </select>
                </div>
            </header>

            <section
                id="feed"
                class="grid grid-cols-1 justify-items-center gap-5 md:grid-cols-2 xl:grid-cols-3"
            >
                <p
                    class="col-span-full rounded border border-zinc-300 bg-white px-6 py-4 text-sm text-zinc-600"
                >
                    Loading posts...
                </p>
            </section>
        </main>

        <dialog
            id="post-modal"
            class="w-[min(540px,calc(100%-1rem))] rounded border border-zinc-300 p-0 backdrop:bg-black/35"
        >
            <form id="post-form" class="grid gap-2 bg-white p-4">
                <h2 class="mb-1 text-xl font-semibold">Add New Post</h2>

                <label class="text-sm font-medium" for="title">Title</label>
                <input
                    id="title"
                    name="title"
                    required
                    minlength="3"
                    maxlength="120"
                    class="w-full rounded border border-zinc-300 bg-zinc-50 px-3 py-2 outline-none focus:border-zinc-700"
                    placeholder="Titulo del post"
                />

                <label class="text-sm font-medium" for="description"
                    >Description</label
                >
                <textarea
                    id="description"
                    name="description"
                    required
                    minlength="10"
                    maxlength="1000"
                    rows="5"
                    class="w-full rounded border border-zinc-300 bg-zinc-50 px-3 py-2 outline-none focus:border-zinc-700"
                    placeholder="Describe la imagen"
                ></textarea>

                <label class="text-sm font-medium" for="imageUrl"
                    >Image URL</label
                >
                <input
                    id="imageUrl"
                    name="imageUrl"
                    type="url"
                    required
                    maxlength="2048"
                    class="w-full rounded border border-zinc-300 bg-zinc-50 px-3 py-2 outline-none focus:border-zinc-700"
                    placeholder="https://..."
                />

                <div class="mt-1 flex gap-2">
                    <button
                        class="rounded border border-zinc-900 bg-zinc-900 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-800"
                        type="submit"
                    >
                        Submit
                    </button>
                    <button
                        class="rounded border border-zinc-400 bg-white px-4 py-2 text-sm font-medium text-zinc-900 hover:bg-zinc-100"
                        type="button"
                        data-close-modal
                    >
                        Cancel
                    </button>
                </div>
            </form>
        </dialog>

        <script type="module" src="/index.js"></script>
    </body>
</html>
